<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>叮 · 小站</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{
      --bg:#fef6f6;
      --accent:#ff7bac;
      --text:#333;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:2rem;
    }
    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:18px;
      box-shadow:0 8px 28px rgba(255,123,172,.25);
      overflow:hidden;
      text-align:center;
      padding-bottom:2rem;
    }
    .cover{
      width:100%;
      height:160px;
      background:url(https://images.unsplash.com/photo-1543807535-ece58ab3db7c?auto=format&fit=crop&w=800&q=60) center/cover;
    }
    .avatar{
      width:80px;height:80px;border-radius:50%;
      border:3px solid #fff;
      margin:-40px auto 0;
      background:url(https://cravatar.cn/avatar/ding) center/cover;
    }
    h1{margin:.6rem 0 .2rem;font-size:1.6rem}
    p.desc{font-size:.95rem;color:#666;margin:.4rem 1rem 1.2rem}
    .links{display:flex;justify-content:center;gap:1.2rem;margin-bottom:1.4rem}
    .links a{color:var(--accent);font-size:1.4rem}
    .btn{
      display:inline-block;
      padding:.55rem 1.4rem;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      font-size:.9rem;
      text-decoration:none;
      transition:.2s;
    }
    .btn:hover{filter:brightness(1.1)}
  </style>
  <!-- Font Awesome 图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="card">
    <div class="cover"></div>
    <div class="avatar"></div>
    <h1>叮</h1>
    <p class="desc">记录代码与生活的二次元小站</p>

    <!-- 社交图标 -->
    <div class="links">
      <a href="https://github.com/dingzifan719" title="GitHub"><i class="fab fa-github"></i></a>
      <a href="mailto:ding@example.com" title="Email"><i class="fas fa-envelope"></i></a>
      <a href="/rss.xml" title="RSS"><i class="fas fa-rss"></i></a>
    </div>

    <!-- 主要按钮 -->
    <a class="btn" href="/archives">开始阅读</a>
  </div>
</body>
</html>
